services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: isla_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./webservice/init.sql:/docker-entrypoint-initdb.d/01_webservice.sql:ro
      - ./pipeline/db/init_pipeline.sql:/docker-entrypoint-initdb.d/02_pipeline.sql:ro
    networks:
      - isla_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  isla_ollama_llava:
    image: ollama/ollama:latest
    runtime: nvidia
    container_name: isla_ollama_llava
    restart: unless-stopped
    environment:
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - ollama_llava_models:/root/.ollama
    networks:
      - isla_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 8
        echo "Descargando LLaVA 13b..."
        ollama pull llava:13b
        echo "Descargando Qwen 2.5 14b..."
        ollama pull qwen2.5:14b
        echo "Modelos listos."
        wait
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_DEVICE_ID:-0}"]
              capabilities: [gpu]

  webservice:
    image: ghcr.io/${GHCR_OWNER:-tu_usuario}/isla-webservice:${IMAGE_TAG:-latest}
    build: ./webservice
    container_name: isla_webservice
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://isla_ollama_llava:11434
      LLM_MODEL: ${LLM_MODEL:-llava:13b}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@isla_postgres:5432/${POSTGRES_DB:-postgres}
    ports:
      - "${WEBSERVICE_BIND:-127.0.0.1}:8001:8001"
    networks:
      - isla_net
    depends_on:
      postgres:
        condition: service_healthy
      isla_ollama_llava:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  davis_poller:
    image: ghcr.io/${GHCR_OWNER:-tu_usuario}/isla-davis-poller:${IMAGE_TAG:-latest}
    build: ./pipeline/davis_poller
    container_name: isla_davis
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@isla_postgres:5432/${POSTGRES_DB:-postgres}
      DAVIS_API_KEY: ${DAVIS_API_KEY:-}
      DAVIS_API_SECRET: ${DAVIS_API_SECRET:-}
      DAVIS_STATION_ID: ${DAVIS_STATION_ID:-}
      POLL_INTERVAL: ${POLL_INTERVAL:-300}
    networks:
      - isla_net
    depends_on:
      postgres:
        condition: service_healthy

  qwen_worker:
    image: ghcr.io/${GHCR_OWNER:-tu_usuario}/isla-qwen-worker:${IMAGE_TAG:-latest}
    build: ./pipeline/qwen_worker
    container_name: isla_qwen
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@isla_postgres:5432/${POSTGRES_DB:-postgres}
      OLLAMA_URL: http://isla_ollama_llava:11434
      QWEN_MODEL: ${QWEN_MODEL:-qwen2.5:14b}
      POLL_SLEEP: ${POLL_SLEEP:-2}
      CAMPUS: ${CAMPUS:-Campus Principal}
      ZONA: ${ZONA:-Acceso Norte}
      CAMARA: ${CAMARA:-usb_cam}
      CONFIANZA_FUMADO_UMBRAL: ${CONFIANZA_FUMADO_UMBRAL:-0.60}
    networks:
      - isla_net
    depends_on:
      postgres:
        condition: service_healthy
      isla_ollama_llava:
        condition: service_healthy

  habits_worker:
    image: ghcr.io/${GHCR_OWNER:-tu_usuario}/isla-habits-worker:${IMAGE_TAG:-latest}
    build: ./pipeline/habits_worker
    container_name: isla_habitos
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@isla_postgres:5432/${POSTGRES_DB:-postgres}
      OLLAMA_URL: http://isla_ollama_llava:11434
      QWEN_MODEL: ${QWEN_MODEL:-qwen2.5:14b}
      VECTORIZE_INTERVAL: ${VECTORIZE_INTERVAL:-3600}
      CLUSTER_HOUR: ${CLUSTER_HOUR:-6}
      MIN_CLUSTER_SIZE: ${MIN_CLUSTER_SIZE:-5}
      UMAP_STATE_FILE: /app/state/umap_state.pkl
      CLUSTER_LABELS_FILE: /app/state/cluster_labels.json
      CLUSTER_STATUS_FILE: /app/state/cluster_job_status.json
      CLUSTER_RECOMPUTE_REQUESTS_FILE: /app/state/cluster_recompute_requests.jsonl
      CLUSTER_LOCK_FILE: /app/state/cluster_job.lock
      UMAP_WINDOW_DAYS: ${UMAP_WINDOW_DAYS:-30}
      MAX_UMAP_VECTORS: ${MAX_UMAP_VECTORS:-50000}
      UMAP_REFIT_DAYS: ${UMAP_REFIT_DAYS:-7}
      DATALAKE_RETAIN_DAYS: ${DATALAKE_RETAIN_DAYS:-30}
    volumes:
      - habitos_state:/app/state
    networks:
      - isla_net
    depends_on:
      postgres:
        condition: service_healthy
      isla_ollama_llava:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  django:
    image: ghcr.io/${GHCR_OWNER:-tu_usuario}/isla-django:${IMAGE_TAG:-latest}
    build: ./dashboard_django
    container_name: isla_django
    restart: unless-stopped
    environment:
      DB_HOST: isla_postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      ALERTA_UMBRAL_FUMADO: ${ALERTA_UMBRAL_FUMADO:-20}
      ALERTA_UMBRAL_PM10: ${ALERTA_UMBRAL_PM10:-54}
      CONFIANZA_FUMADO_UMBRAL: ${CONFIANZA_FUMADO_UMBRAL:-0.60}
      API_KEY: ${API_KEY:-}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-cambia-esto-en-produccion}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-nginx,localhost,127.0.0.1,.ts.net}
    volumes:
      - habitos_state:/app/habitos_state
    networks:
      - isla_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: ghcr.io/${GHCR_OWNER:-tu_usuario}/isla-nginx:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: isla_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - isla_net
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/api/health/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    external: true
    name: ${POSTGRES_VOLUME:-servidor_postgres_data}
  ollama_llava_models:
  ollama_qwen_models:
  habitos_state:

networks:
  isla_net:
    driver: bridge
    name: ${ISLA_NETWORK:-proyecto_isla_netg}
