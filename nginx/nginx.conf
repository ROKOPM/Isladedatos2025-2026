server {
    listen 80;
    server_name _;

    auth_basic           "Dashboard Habitos";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Health check — sin auth para que Docker no falle ─────────
    location = /api/health/ {
        auth_basic off;
        proxy_pass        http://isla_django:8000;
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
    }

    # ── API → Django — sin auth para que el frontend pueda consumir ──
    location /api/ {
        auth_basic off;
        proxy_pass         http://isla_django:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # ── Patrones Raw standalone — sin auth, sin caché ──────────────
    location = /patrones.html {
        auth_basic off;
        root       /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Favicon ──────────────────────────────────────────────────
    location = /favicon.svg {
        auth_basic off;
        root       /usr/share/nginx/html;
    }

    # ── Assets con hash en el nombre (JS, CSS) — sin auth ────────
    location ~* ^/assets/.*\.(js|css)$ {
        auth_basic off;
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Otros assets estáticos (imágenes, fuentes, svg) ──────────
    location ~* \.(svg|png|ico|woff2|woff|ttf)$ {
        auth_basic off;
        root       /usr/share/nginx/html;
        expires    30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── index.html — nunca cachear, siempre fresco — sin auth ────
    location = /index.html {
        auth_basic off;
        root       /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback — sin auth ──────────────────────────────────
    location / {
        auth_basic off;
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
